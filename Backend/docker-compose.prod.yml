services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rpg_companion
      POSTGRES_PASSWORD: rpg_companion
      POSTGRES_DB: rpg_companion
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg_companion -d rpg_companion"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8010:8000"
    env_file:
      - .env.prod
    environment:
      IN_DOCKER: "1"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/app/scripts/docker-entrypoint-prod.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    restart: unless-stopped

volumes:
  postgres_data_prod:
